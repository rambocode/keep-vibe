name: Build macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_SIGNING_CERTIFICATE_P12: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
      APPLE_SIGNING_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build release binary
        run: swift build -c release

      - name: Import Apple signing certificate
        if: >
          github.event_name == 'push' &&
          github.repository == github.event.repository.full_name &&
          startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" || -z "${APPLE_SIGNING_CERTIFICATE_P12:-}" || -z "${APPLE_SIGNING_PASSWORD:-}" ]]; then
            echo "Signing secrets are missing, skip certificate import."
            exit 0
          fi

          KEYCHAIN_NAME="build.keychain-db"
          KEYCHAIN_PATH="${RUNNER_TEMP}/${KEYCHAIN_NAME}"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -t 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security list-keychains -s "${KEYCHAIN_PATH}"

          CERT_FILE="${RUNNER_TEMP}/apple-signing.p12"
          echo "${APPLE_SIGNING_CERTIFICATE_P12}" | base64 --decode > "${CERT_FILE}"
          security import "${CERT_FILE}" -k "${KEYCHAIN_PATH}" -P "${APPLE_SIGNING_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Package macOS app
        env:
          APP_NAME: KeepVibe
          BUNDLE_IDENTIFIER: com.keepvibe.macos
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0' }}
          BUILD_NUMBER: ${{ github.run_number }}
          IS_RELEASE_TAG_BUILD: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == github.event.repository.full_name }}
        run: |
          set -euo pipefail
          if [[ "${IS_RELEASE_TAG_BUILD}" == "true" && -n "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            export CODE_SIGN_IDENTITY="${APPLE_SIGNING_IDENTITY}"
          else
            export CODE_SIGN_IDENTITY=""
          fi
          ./scripts/build-macos-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeepVibe-macos
          path: |
            dist/KeepVibe-macos.zip
            dist/KeepVibe-macos.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: KeepVibe-macos
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KeepVibe-macos.zip
            dist/KeepVibe-macos.dmg
